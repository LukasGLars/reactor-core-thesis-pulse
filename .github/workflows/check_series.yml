name: Check FRED Series
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: Check series
        env:
          FRED_API_KEY: ${{ secrets.FRED_API }}
        run: python check_fred.py
