name: Test Vol Events

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run vol events
        env:
          FRED_API_KEY: ${{ secrets.FRED_API }}
        run: python vol_events.py
