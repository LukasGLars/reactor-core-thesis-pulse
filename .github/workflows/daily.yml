name: Thesis Pulse Daily

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 07:00 UTC = 09:00 CET, weekdays
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Backfill logs if not present
        env:
          FRED_API_KEY: ${{ secrets.FRED_API }}
        run: |
          lines=$(wc -l < macro_log.csv 2>/dev/null || echo 0)
          if [ "$lines" -gt 1 ]; then
            echo "Logs present (${lines} rows) — skipping backfill"
          else
            echo "Logs missing — running backfill..."
            python backfill_logs.py
          fi

      - name: Patch blank columns
        env:
          FRED_API_KEY: ${{ secrets.FRED_API }}
        run: python -c "from backfill_logs import patch_macro_log; patch_macro_log()"

      - name: Run Thesis Pulse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API }}
          EMAIL_ADDRESS:     ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          WGC_EMAIL:         ${{ secrets.WGC_EMAIL }}
          WGC_PASSWORD:      ${{ secrets.WGC_PASSWORD }}
        run: python thesis_pulse.py

      - name: Commit daily logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_log.csv asset_log.csv
          git diff --cached --quiet || git commit -m "[data] $(date -u +%Y-%m-%d) daily log"
          git push
