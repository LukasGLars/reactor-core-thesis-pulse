open_items:
  - "Yahoo Finance reliability: GC=F, SI=F, and DXY proxy all depend on Yahoo's
    unofficial API which has no SLA and breaks periodically. Implement fallback
    handling so the pulse degrades gracefully (use cached value + STALE flag)
    rather than failing silently. Consider Stooq as secondary source for FX."
  - "Uranium pre-2021 daily data: no free source. Either pay UxC subscription or
    accept monthly resolution for backtests covering 2012-2020 cycle."
